spring:
  application:
    name: kai-toolbox
  threads:
    virtual:
      enabled: true
  mvc:
    async:
      request-timeout: -1            # SSE 长连接，禁用超时

server:
  port: 8080
  compression:
    enabled: true

# 数据存储位置：用户目录下的 .kai-toolbox/
toolbox:
  data-dir: ${user.home}/.kai-toolbox
  sqlite:
    file: ${toolbox.data-dir}/toolbox.db
    busy-timeout-ms: 5000
    journal-mode: WAL

  mail:
    enabled: false          # 设为 true 启动内嵌 SMTP 服务器
    port: 1025              # Linux 25 端口需要 root；建议用 1025 + iptables 转发
    hostname: localhost     # SMTP EHLO 响应 hostname
    sender-whitelist:       # 发件人白名单，空列表接受所有来源
      # - "@amazon.com"
      # - "@ebay.com"

logging:
  level:
    root: INFO
    com.exceptioncoder.toolbox: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
