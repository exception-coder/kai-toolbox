spring:
  application:
    name: kai-toolbox
  ai:
    mcp:
      server:
        # 简历能力 MCP server(SSE 传输,挂在主端口 :18080)。SSE 端点默认 /sse,消息端点 /mcp/message。
        # 工具由 ResumeMcpConfig 的 ToolCallbackProvider 注册。MCP 客户端(Claude Code / 自有智能体)填
        # http://localhost:18080/sse 即可调。端点为 RouterFunction,不走 @SoftGuard(本机单用户,不暴露公网)。
        name: kai-toolbox-resume
        version: 0.1.0
        type: SYNC
        instructions: "kai-toolbox 简历能力:按 id 幂等增改/删除项目、工作、教育,字段级改基本信息,整组替换技能。改动前可先 resume_get 或 resume_list_projects 查看现状。"
    # 简历 AI 优化用的 LLM(OpenAI 兼容协议)。当前仅简历优化用到 chat 能力,故全局 spring.ai.openai 即此用途。
    # 默认 DeepSeek 远端;base-url 不带 /v1,OpenAiApi 会自动拼 /v1/chat/completions。
    #   DeepSeek : base-url=https://api.deepseek.com  model=deepseek-chat  需 TOOLBOX_RESUME_LLM_API_KEY
    #   本地 Ollama: base-url=http://localhost:11434  model=qwen2.5:7b     api-key 任意占位即可
    #   OpenAI   : base-url=https://api.openai.com    model=gpt-4o-mini
    # api-key 留占位符是为了让自动配置在本地 Ollama(无需 key)场景也能正常启动,真实 key 走环境变量。
    openai:
      base-url: ${TOOLBOX_RESUME_LLM_BASE_URL:https://api.deepseek.com}
      api-key: ${TOOLBOX_RESUME_LLM_API_KEY:local-no-key-needed}
      chat:
        options:
          model: ${TOOLBOX_RESUME_LLM_MODEL:deepseek-chat}
          temperature: 0.4
  threads:
    virtual:
      enabled: true
  mvc:
    async:
      request-timeout: -1            # SSE 长连接，禁用超时
  servlet:
    multipart:
      # claude-chat 附件上传上限；留余量让 AttachmentStorageService 的 50MB 应用层校验先返回友好错误
      max-file-size: 60MB
      max-request-size: 70MB

server:
  port: 18080
  compression:
    enabled: true

# 数据存储位置：用户目录下的 .kai-toolbox/
toolbox:
  # 简历优化「快速」引擎走上面的 spring.ai.openai(DeepSeek)；「高质量」引擎走 Claude 编码 Agent
  # (复用 claude-chat sidecar，用 Claude 登录态，不花 key)，无需在此配置。
  data-dir: ${user.home}/.kai-toolbox
  log-dir: ${toolbox.data-dir}/logs
  sqlite:
    file: ${toolbox.data-dir}/toolbox.db
    # 单写者锁等待时长。大表 DELETE（数十万行级）+ 后台扫描 batchInsert 并发时，
    # 5s 容易触发 SQLITE_BUSY；30s 给 SQLite 足够退让时间，配合应用层串行化与
    # ScanRepository.deleteById 的事务合并使用。
    busy-timeout-ms: 30000
    journal-mode: WAL
  # 共享 LLM 网关（toolbox-llm）：模型池 + 分级路由 + 限流故障转移。
  # 同 tier 的多个成员构成一个池，按 weight 分发、对失败成员熔断退避（cooldown-ms）后转移到下一个。
  # 不配置任何 models 时，网关兜底用本地 Ollama qwen2.5:7b-instruct。
  llm:
    models:
      - id: local-qwen
        tier: capture            # 记录态高频，用本地便宜模型
        base-url: http://localhost:11434/v1
        api-key: ollama
        model: qwen2.5:7b-instruct
        weight: 1
        cooldown-ms: 15000
      # 远端示例：与本地互为故障转移 / 限流时分摊（按需取消注释并配 key）
      # - id: deepseek
      #   tier: recall           # 回忆态多步推理，用更强的模型
      #   base-url: https://api.deepseek.com/v1
      #   api-key: ${TOOLBOX_LLM_DEEPSEEK_KEY:}
      #   model: deepseek-chat
      #   weight: 2
  # 「AI 对话」模块：经 4sapi（OpenAI 兼容中转）直连多模型的 API 流式聊天。
  # 与 Vibe coding（claude-chat，agent 模式）不同——本模块直接调 /v1/chat/completions，无 agent。
  # 标 @Refreshable，base-url / api-key / 参数可在配置中心在线改、不重启。模型清单实时取自 4sapi /v1/models。
  ai-chat:
    base-url: ${TOOLBOX_AI_CHAT_BASE_URL:https://4sapi.com/v1}
    api-key: ${TOOLBOX_AI_CHAT_API_KEY:}
    temperature: 0.7
    timeout-seconds: 60
    max-history-messages: 40
    models-cache-ttl-seconds: 300
    # 命令执行工具(runCommand):默认关闭,高风险能力须显式开启。
    # 开启后仍受多层护栏约束:不经 shell 分词执行、前缀白名单、元字符/路径逃逸拦截、
    # 工作目录沙箱、超时与输出截断。白名单即「预先批准」,只放行其中的命令前缀。
    shell:
      enabled: ${TOOLBOX_AI_CHAT_SHELL_ENABLED:false}
      # workdir: ${user.home}/.kai-toolbox/ai-chat-workspace
      # timeout-seconds: 30
      # max-output-chars: 4000
      # allow:   # 不配则用代码内置的只读安全白名单(git status/log/diff、ls、cat 等)
      #   - git status
      #   - ls
    # 模型 id 命中其一即判为多模态（小写子串匹配）
    multimodal-patterns:
      - gpt-4o
      - gpt-4.1
      - o1
      - o3
      - claude
      - gemini
      - vision
      - qwen-vl
      - glm-4v
  # AI 秘书向量 RAG（语义检索）。默认关闭——开启前置：
  #   1) ollama pull bge-m3   2) 启动 Qdrant: docker run -p 6333:6333 -p 6334:6334 qdrant/qdrant
  #   3) 把 enabled 改 true 重启。关闭时整套 RAG 不装配，回忆态退回工具路由。
  ai-secretary:
    rag:
      enabled: false
      embedding-base-url: http://localhost:11434/v1
      embedding-api-key: ollama
      embedding-model: bge-m3
      vector-size: 1024            # bge-m3 原生维度，换模型须同步改并重建集合
      qdrant-host: localhost
      qdrant-port: 6334            # gRPC 端口（REST 是 6333）
      qdrant-use-tls: false
      # Qdrant 开了 API Key 认证就填（须与 docker 的 QDRANT__SERVICE__API_KEY 一致）；留空=不认证
      qdrant-api-key: ${TOOLBOX_AI_SECRETARY_QDRANT_API_KEY:}
      collection: ai_secretary_notes
      max-results: 5
      # bge-m3 中文余弦分偏"压缩"：账号密码类 0.49~0.59、开销类 ≤0.43，0.45 卡在二者安全带中间
      # （实测「ERP 账号」对 kai-toolbox 那条 0.486，0.5 会误杀，故下调）
      min-score: 0.45
  # Java 八股复习秘书向量 RAG。独立集合 java8gu_cards，与个人秘书物理隔离。默认关闭，开启前置同上。
  # 复用同一 Qdrant：api-key 共享 ai-secretary 的环境变量，host/port 由启动脚本 -D 指向远端。
  java8gu:
    rag:
      enabled: false
      embedding-base-url: http://localhost:11434/v1
      embedding-api-key: ollama
      embedding-model: bge-m3
      vector-size: 1024
      qdrant-host: localhost
      qdrant-port: 6334
      qdrant-use-tls: false
      qdrant-api-key: ${TOOLBOX_AI_SECRETARY_QDRANT_API_KEY:}
      collection: java8gu_cards
      max-results: 6
      min-score: 0.45
      # 卡片内容目录（含 index.json 与 q/{id}.md）；相对路径按工作目录(仓库根)解析
      content-dir: frontend/public/java8gu
  # 访客分析智能体。确定性匹配（客户库/竞品名单）在 Java 完成；灰区交 Python AgentScope sidecar。
  # sidecar 见 python-services/visitor-analysis（默认 :9600）；不启动则灰区降级为待人工确认，不影响确定性判别。
  # 模型 key 由 sidecar 持有（走第三方 OpenAI 兼容平台），Java 这侧不接模型。
  visitor-analysis:
    sidecar-url: ${TOOLBOX_VA_SIDECAR_URL:http://127.0.0.1:9600}
    sidecar-timeout-seconds: 60
    # LLM 置信度低于此值的灰区判别进人工复核；确定性命中不受约束
    review-threshold: 0.7
  system:
    # 远程重启端点 token。经公网 tunnel 暴露，留空 = 端点关闭（返回 503）。必须显式配才开放。
    # 用环境变量覆盖：TOOLBOX_SYSTEM_RESTART_TOKEN=随机串
    restart-token: ${TOOLBOX_SYSTEM_RESTART_TOKEN:}
  ffmpeg:
    # 默认走 PATH。本机非 PATH 安装时用环境变量覆盖：
    #   TOOLBOX_FFMPEG_BINARY=D:\devapps\ffmpeg\bin\ffmpeg.exe
    #   TOOLBOX_FFPROBE_BINARY=D:\devapps\ffmpeg\bin\ffprobe.exe
    binary: ${TOOLBOX_FFMPEG_BINARY:D:\devapps\ffmpeg-8.1.1-full_build\bin\ffmpeg.exe}
    ffprobe-binary: ${TOOLBOX_FFPROBE_BINARY:D:\devapps\ffmpeg-8.1.1-full_build\bin\ffprobe.exe}
    probe-timeout-ms: 5000
    # 硬件加速（仅 HLS 重编码路径有效；视频编码已是 h264 时直接 copy 不走这里）。
    # 留空 = 纯 CPU 软编。可选：qsv（Intel Quick Sync）、nvenc / cuda（NVIDIA）、amf（AMD)、
    # videotoolbox（macOS）、auto（让 ffmpeg 自动选）。配错会导致 ffmpeg 启动失败，看启动日志。
    # 本机：RTX 4060 Ti → cuda（解码 + NVENC 编码全 GPU 零拷贝）。
    hwaccel: "cuda"
  deeplx:
    # 翻译提供商: ollama（本地模型，推荐）或 deeplx（本地 DeepL 代理）
    provider: ollama
    # Ollama: 基础 URL（不含路径）
    url: "http://localhost:11434"
    ollama-model: translategemma:4b   # 翻译专用模型；如需通用模型可换 qwen2.5:3b / qwen2.5:7b
    # DeepLX: 切换为 deeplx 时把 url 改为 http://localhost:1188/translate
    token: ""
    target-lang: ZH            # 目标语言：ZH = 简体中文
    max-concurrent: 2          # Ollama GPU 并发 2 即可，避免显存打满
    timeout-seconds: 30        # 小模型首 token 约 1-2s，30s 足够一条字幕
  whisper:
    # 字幕生成后端选择：
    # - cli (默认)        调本地 whisper-cli.exe 子进程。反幻觉四件套（-nc + 三阈值）已通过 yml 注入。
    # - asr-service       调本地 faster-whisper Python HTTP 服务（fallback）
    #                     需先启动 python-services/faster-whisper/start.bat
    mode: cli
    # ASR 服务地址，仅当 mode=asr-service 时使用
    service-url: ${TOOLBOX_WHISPER_ASR_URL:http://127.0.0.1:9500}

    # whisper.cpp 二进制路径。CUDA 构建版会自动用 NVIDIA GPU；无 GPU 装 CPU 版亦可。
    # 下载：https://github.com/ggml-org/whisper.cpp/releases (Windows 选 cuBLAS 版本)
    binary: "D:\\devapps\\whisper-cublas-12.4.0-bin-x64\\Release\\whisper-cli.exe"
    # ggml/gguf 模型文件路径。强烈推荐 large-v3-turbo（1.5GB，medium 大小但准确度近 large-v3）：
    #   https://huggingface.co/ggerganov/whisper.cpp/blob/main/ggml-large-v3-turbo.bin
    # 下完后用环境变量切换，无需改本文件：
    #   TOOLBOX_WHISPER_MODEL=D:\devapps\ggml-large-v3-turbo.bin
    model-path: ${TOOLBOX_WHISPER_MODEL:D:\devapps\ggml-medium.bin}
    # model-name 仅用作字幕任务的元数据标签，便于事后追溯用了哪个模型。
    model-name: ${TOOLBOX_WHISPER_MODEL_NAME:medium}
    # 字幕落盘目录。空字符串时由 SubtitleService 兜底 ${toolbox.data-dir}/subtitles。
    output-dir: ${toolbox.data-dir}/subtitles
    threads: 0                  # 0 = 让 whisper.cpp 自己挑
    disable-gpu: false          # CUDA 构建默认走 GPU；调试时可强制改 CPU
    # 以下两个 opt-in 开关默认关闭。实测部分 whisper.cpp 构建（即使是 v1.8+）传 -fa 或 -su
    # 后会让 transcribe 跑完不写 VTT，原因未明（也许是参数解析路径上的 bug）。建议两个都
    # 保持 false 先把字幕跑通，确认字幕正常后再逐个改 true 验证你这版 whisper.cpp 是否兼容。
    flash-attention: false      # -fa Flash Attention（CUDA 加速 30-50%，opt-in 验证后开）
    split-on-word: false        # -su 按词切 chunk 防吞字（opt-in 验证后开）
    max-concurrent-jobs: 1      # GPU 一次跑一条最快
    timeout-seconds: 0          # 0 = 不超时，长片不被砍
    # 默认 initial prompt：每次转写前喂给 whisper 当作上下文（最长 224 token，约 150 字）。
    # 适合放专有名词、人名、品牌名 — 模型会更愿意输出这些 token，减少吞字。
    # 留空即不传。前端的「专有名词」输入框会覆盖此默认值。
    default-initial-prompt: ""
    # Silero VAD ggml 模型路径，启用后 whisper 自动跳过静音段，长视频提速 + 减少幻觉。
    # 下载：https://huggingface.co/ggml-org/whisper-vad/tree/main （选 ggml-silero-v5.1.2.bin）
    # 留空 = 不启用 VAD。
    vad-model-path: ${TOOLBOX_WHISPER_VAD_MODEL:}
    # 反幻觉三件套：视频中后段非语音（哭声 / 喘息 / 配乐）容易让 whisper 复读 "(泣き声)"
    # 这类 non-speech 标签直到结尾。把这三个收紧后,模型在低置信段更倾向判静音或重新
    # decode,显著减少幻觉。三个值映射到 whisper-cli 的同名 flag:
    #   --no-speech-thold / --logprob-thold / --entropy-thold (最后一个实为压缩比阈值)。
    # 若发现真实台词被砍掉,把 no-speech 改回 0.6 / logprob 改回 -0.7 折中。
    no-speech-threshold: 0.75
    logprob-threshold: -0.5
    entropy-threshold: 2.0
    # 关闭跨段 prompt 拼接 (whisper-cli -nc / faster-whisper condition_on_previous_text=False)。
    # 默认 true:长视频中段一次幻觉不会沿 prompt 链传染到结尾,代价是跨段一致性略降,
    # 人名/术语建议靠 default-initial-prompt 喂。Python 端 server.py 已硬编码此行为。
    no-context: true
    # whisper-cli 各 build 间漂移的 flag 字面值集中维护。所有字段默认对齐 v1.7+ cuBLAS build,
    # 跑你这个 build 跑不通时按需 override。改这里不需要重新编译 Java,改完重启 Spring Boot 即可。
    #
    # 历史踩坑(已经在默认值里处理掉的):
    # - v1.5- 是 -nc(--no-context),v1.7+ 删了只剩 --max-context N(N=0 等价)
    # - --no-speech-thold 在很老的 build 是 --no-speech-threshold
    # - -fa 默认值在 cuBLAS build 间反复改,本工程显式 opt-in 走 flash-attention: true 才传
    cli:
      # 结构化 flag(几乎不会变,但留着便于异类 build 适配)
      model-flag: "-m"
      file-flag: "-f"
      language-flag: "-l"
      output-vtt-flag: "-ovtt"
      output-prefix-flag: "-of"
      # 打印 progress = X% 的 flag;删了 Java 端 stderr 正则就解析不到进度,前端 0% 卡住
      print-progress-flag: "-pp"
      suppress-prints-flag: "-np"
      prompt-flag: "--prompt"
      threads-flag: "-t"
      no-gpu-flag: "--no-gpu"
      flash-attn-flag: "-fa"
      split-on-word-flag: "-su"
      vad-flag: "--vad"
      vad-model-flag: "--vad-model"
      # 反幻觉三件套的 flag 名(值在上面 no-speech-threshold / logprob-threshold / entropy-threshold)
      no-speech-thold-flag: "--no-speech-thold"
      logprob-thold-flag: "--logprob-thold"
      entropy-thold-flag: "--entropy-thold"
      # no-context 实现:老版用 -nc(开关,value 留空);新版用 -mc 0(必须带 value="0")
      # 升 v1.5- 时:把 max-context-flag 改 "-nc",max-context-value-for-no-context 改 ""
      max-context-flag: "-mc"
      max-context-value-for-no-context: "0"
      # 兜底逃生口:任意额外 args,WhisperRunner 在所有上面 flag 后原样追加,适合临时验证
      # 实验性 flag(例如 -bs 5 / --temperature 0.0 / --suppress-nst)而不用改 Java。
      # 每个 token 单独一行,不能在一行内塞多个用空格分隔。
      extra-args: []
        # - "-bs"
        # - "5"
        # - "--temperature"
        # - "0.0"
  thumbnail:
    cache-dir: ${toolbox.data-dir}/cache/thumbs
    # 同时跑的 ffmpeg 数量，每个吃 1-2 核。默认 2：留 CPU 给 HLS 播放，避免你点视频的瞬间
    # 缩略图占满核导致播放卡顿。8 核以上机器可以提到 4。
    max-parallel: 2
    timeout-ms: 15000
    # JPEG 质量：1（无损）到 31（最差），4 在 480×270 上视觉无损约 30-50KB。
    jpeg-quality: 4
  video:
    # 视频合并（多选 → 拼成一个 mp4）配置
    merge:
      # 合并输出目录，留空 = ${user.home}/.kai-toolbox/merged
      output-dir: ""
      # 重编码统一目标分辨率（仅 reencode 路径生效，copy 路径不缩放）
      target-resolution: "1280x720"
      target-fps: 30
      # 单次最多合并的输入数
      max-inputs: 200
      # ffmpeg 合并进程硬超时（秒）
      timeout-s: 1800
    extensions:
      - mp4
      - m4v
      - mov
      - webm
      - ogv
      - mkv
      - avi
      - flv
      - wmv
      - rmvb
      - 3gp
      - ts
      # mts 故意不在默认列表：和 TypeScript ESM (.mts / .d.mts) 撞扩展，开发者磁盘上几乎全是噪音。
      # 真有 AVCHD 录像 (.mts) 的用户请按需手动加回。
      - m2ts
      - vob
      - asf
      - divx
      - mpeg
      - mpg
      - m2v
      - amc

  media-parser:
    # 默认走 PATH。本机非 PATH 安装时用环境变量覆盖：
    #   TOOLBOX_YT_DLP_BINARY=D:\devapps\yt-dlp.exe
    #   TOOLBOX_FFMPEG_BINARY=D:\devapps\ffmpeg\bin\ffmpeg.exe
    yt-dlp-binary: ${TOOLBOX_YT_DLP_BINARY:D:\devapps\yt-dlp.exe}
    ffmpeg-binary: ${TOOLBOX_FFMPEG_BINARY:D:\devapps\ffmpeg-8.1.1-full_build\bin\ffmpeg.exe}
    read-timeout-seconds: 60       # 元数据解析超时
    download-timeout-seconds: 300  # 文件下载超时（5 分钟，大视频用）
    # 统一代理：留空走直连；填了会同时应用到 Jsoup / HttpClient / yt-dlp --proxy。
    # 启动后看 HttpProxyDiagnosticsReporter 的日志确认实际生效情况。
    # 用 TOOLBOX_HTTP_PROXY=http://127.0.0.1:7897 覆盖。
    proxy: ${TOOLBOX_HTTP_PROXY:}
    # Playwright Chromium 降级：抖音/小红书等 yt-dlp 失败时启用。
    # 首次启动会下载 ~150MB Chromium 到 ~/.cache/ms-playwright/，最好让 IDE 启动时也走代理。
    playwright:
      enabled: true         # 抖音/小红书走 Playwright 降级时打开
      headless: true        # 调试时改 false 能看到浏览器实际渲染
      page-timeout-ms: 30000

  projects:
    # 「项目管理」面板扫描的根目录，仅扫描一级子目录。
    # 修改后无需重启即可在 application.yml 中调整；缓存 TTL 内的请求仍读旧值。
    root: D:\Users\zhang\myWork
    cache-ttl-seconds: 5
    # 一级目录名以这些前缀开头时跳过（默认隐藏目录 + 归档目录）
    hidden-prefixes:
      - "."
      - "_"

  claude-chat:
    # 新建 Claude 会话时「工作目录下拉」的扫描配置。仅扫各 root 的一级子目录。
    # roots 为空 = 下拉为空，仍可手填 cwd。
    workspace:
      roots: []
        # - "D:\\Users\\zhang\\IdeaProjects"
      cache-ttl-seconds: 5
      hidden-prefixes:
        - "."
        - "_"
      # 知识库（project-domain-knowledge）本地 clone 的 knowledge/ 目录绝对路径。
      # 配置后，项目工作台列模块时优先读 {此目录}/{项目目录名}/impl/modules.json
      # （项目目录名须 == 知识库 project key），按其声明的业务模块树 + 代码路径渲染；
      # 找不到则回退按构建标志文件自动识别。为空 = 不启用。
      # 后端只读本地文件，不联网、不执行 git；保持最新需自行 git pull。
      knowledge-base-dir: "D:\\Users\\zhang\\myWork\\project-domain-knowledge\\knowledge"
      # 例： knowledge-base-dir: "D:\\Users\\zhang\\myWork\\project-domain-knowledge\\knowledge"

  browser-request:
    # 持久 BrowserContext 数据目录（cookies/storage state），留空 = ${toolbox.data-dir}/browser-request
    data-dir: ${toolbox.data-dir}/browser-request
    # 会话引擎：playwright-java（默认，自带 Playwright，录制/回放全功能，但会被 BOSS zpAegis 等商用反爬经
    # CDP(Runtime.enable) 检测→打不开硬反爬站点）；undetected-node（patchright sidecar，规避 CDP 检测，
    # 实测可开 BOSS，Phase 1 仅支持 开/保活/页签/存登录态/清除/关闭，录制回放暂无）。
    # 切 undetected-node 前需先在 node-services/undetected-browser 跑 npm install + npm run install-browser。
    engine: playwright-java
    sidecar:
      port: 18092
      channel: chrome        # chrome=本机真实 Chrome（最隐蔽）；留空=patchright 内置 chromium
      headless: false        # 扫码登录需可见窗口
      token: ""              # 留空=不校验（本机 loopback）
      node-path: node
      dir: node-services/undetected-browser
      auto-start: true       # 由 Java 自动拉起 sidecar 进程
      startup-timeout-ms: 30000
    # BOSS 直聘风控码拦截器（ctx.route + route.fetch 改写 JSON code）。默认 false：它对每个 XHR 做
    # 服务端重放，经代理对 zhipin 域易超时/失败，曾引发 navigate 崩溃 / 卡加载 / 渲染进程 OOM 白屏；
    # 未触发风控时无收益。仅在确认被风控弹回（code 31/32/35/36/37/5012）时再设 true。
    boss-risk-bypass: false
    # 必须 false：用户要在弹出的窗口里手动登录目标站点
    headless: false
    request-timeout-ms: 60000
    # 同 media-parser，留空走直连
    proxy: ${TOOLBOX_HTTP_PROXY:}
    # 自动把 cookies / localStorage 持久化到磁盘，下次打开不用重新登录。
    # 关掉则只能手动点「保存登录态」。每次保存会调 Chromium 的 storageState API，
    # Windows 下可能短暂把窗口抢到前台 + 占用 Playwright worker 几十毫秒，
    # 所以默频拉长到 15 分钟；录制过程中会自动 skip（见 SessionAutoSaver）。
    auto-save-enabled: true
    auto-save-interval-ms: 900000

  vscode-tunnel:
    # 设为 false 后 /api/vscode-tunnel/start 与 /events 返回 503
    enabled: true
    # code CLI 可执行文件路径。默认走 PATH；本机非 PATH 安装时写绝对路径
    code-path: code
    # 隧道名（决定 https://vscode.dev/tunnel/<name>），留空 = 当前主机名
    tunnel-name: ""
    # 透传 code tunnel 的 --accept-server-license-terms（同意微软许可），关掉后 CLI 会卡在交互提示
    accept-license: true
    # 调用 stop() 时 SIGTERM 之后给 code 进程的优雅退出时间，超时 SIGKILL
    stop-grace-ms: 5000
    # ERROR 状态下保留多少字节 stdout 尾段作为 lastError 上报前端
    error-tail-bytes: 1024

  downloader:
    # 默认保存目录。留空走 ${user.home}/Downloads/kai-toolbox
    default-save-path: ${user.home}/Downloads/kai-toolbox
    # 分片字节数。32 MiB 是 8 路并发下 256 MB 文件的甜点；过小切片多调度开销，过大并发收益降低
    segment-size: 33554432
    # 单任务最大并发分片数。8 对国内 CDN 偏激进（容易触发服务端关 TLS / 限并发），改 4 更稳。
    # 真的需要拉满带宽时按需调到 8 ~ 16；服务端不喜欢的话会回退到单 segment（segment retry exhaust）。
    max-parallel-per-task: 4
    max-parallel-global: 16
    # 链路探测整体超时；过短会让弱代理被误判
    probe-timeout-ms: 8000
    # race 拉取字节数，256 KiB 通常足够区分代理 vs 直连的吞吐差距
    probe-bytes: 262144
    # 分片重试次数（不含首次）。6 次足以扛过 CDN 偶发 20-60 秒小风暴；
    # 退避序列 1s/2s/4s/8s/16s/30s 加 ±50% jitter，总最长约 1 分钟
    segment-retry-max: 6
    segment-retry-backoff-base-ms: 1000
    segment-retry-backoff-max-ms: 30000
    sse-flush-interval-ms: 500
    connect-timeout-ms: 10000
    request-timeout-ms: 0       # 0 = 不限制单次请求总耗时（依赖 worker 协作中断 + 重试机制）
    # 读空闲超时：worker 在此时间内读不到一个字节就认为 stalled，主动关流让 read 抛异常 → 触发重试
    # 治「速率 = 0 但状态还是下载中」的卡死 bug
    read-idle-timeout-ms: 30000
    # 显式代理 URL。留空时按 HTTPS_PROXY / HTTP_PROXY / TOOLBOX_HTTP_PROXY 环境变量探测；
    # 与 media-parser / browser-request 的代理约定保持一致。
    proxy: ${TOOLBOX_HTTP_PROXY:}

    # CDN 节点 DNS 散打（仅 OkHttp 引擎生效；走代理时自动退化为普通模式）
    # 原理：DNS 解析域名通常返回多个 CDN 边缘节点 IP，让每个分片 socket 绑不同 IP，
    #      绕过服务端「同 IP 单 socket 限速」。
    # 代价：强制走 HTTP/1.1（H2 单连接设计与散打互斥）、禁用 ConnectionPool（每片新建 TCP+TLS 握手）。
    # 跨境 CDN 场景效果显著；同地区 CDN 提升有限。
    dns-spread:
      enabled: true
      cache-ttl-ms: 300000         # DNS 缓存 5 分钟
      ipv4-only: true              # IPv6 在国内 CDN 不稳定，默认只用 v4

  magnet:
    # 磁力 / BT 下载工具：本地 aria2c 子进程 + 公共种子缓存解析。
    enabled: true
    # aria2c 二进制路径。默认走 PATH；本机非 PATH 安装时用环境变量覆盖：
    #   TOOLBOX_ARIA2_BINARY=D:\devapps\aria2-1.37.0-win-64bit-build1\aria2c.exe
    binary: ${TOOLBOX_ARIA2_BINARY:aria2c}
    # 默认保存目录。留空走 ${user.home}/Downloads/kai-toolbox-magnet
    default-save-path: ${user.home}/Downloads/kai-toolbox-magnet

    # RPC：本机 loopback only
    rpc-port: 6800
    rpc-secret: ""           # 留空 → 启动时自动生成随机 32 字符
    startup-timeout-ms: 10000
    stop-grace-ms: 3000

    # BT / DHT 行为
    enable-dht: true
    enable-lpd: true
    bt-metadata-only: false
    bt-save-metadata: true
    seed-time-seconds: 0     # 完成即停，不做种
    bt-listen-port: 51413    # 路由器端口转发用同一端口提速

    # 并发 / 限速
    max-concurrent-downloads: 5
    max-connections-per-server: 16
    max-upload-limit-bps: 0  # 0 = 不限速

    # 代理：影响 HTTP/HTTPS 下载 + HTTP tracker
    # UDP tracker / DHT / peer wire 不受影响（aria2 协议设计上 UDP 不走代理）
    proxy: ${TOOLBOX_HTTP_PROXY:}

    # session 文件，重启 toolbox 时 aria2 自动恢复未完成任务
    session-file: ${toolbox.data-dir}/aria2/session.txt

    # ---------- 关键：提交磁力前从自托管 metadata-fetcher 拉 .torrent,跳过 DHT metadata 阶段 ----------
    # 部署见 tools/tool-magnet/docs/metadata-fetcher/README.md
    # 2024+ 公共缓存站(itorrents/torrage/btcache)全部凉了,只能自己挂一个机房上的小服务
    resolver:
      enabled: true
      mirrors:
        - "${TOOLBOX_MAGNET_METADATA_URL:http://170.106.186.65:9000/metadata/{HASH_UPPER}}"
      per-mirror-timeout-ms: 65000   # 给 metadata-fetcher 60s 拉 DHT + 5s 余量
      total-timeout-ms: 70000
      max-bytes: 8388608             # 8 MiB,正常 .torrent 几十 KB 到 1 MB
      use-global-proxy: false        # 自托管在你自己 VPS 上,国内直连,不走代理

  auth:
    # 通用 JWT 鉴权能力库总开关。开启后登录/刷新等接口生效；但只有命中 protected-patterns
    # 的路径才硬鉴权，其余请求仍透明放行（best-effort 认证）。视频库/磁盘管理走 @SoftGuard 软鉴权。
    enabled: true
    # HS256 对称密钥，>= 32 字节。本地默认值仅为开箱可启动，生产/公网务必用环境变量覆盖：
    #   TOOLBOX_AUTH_SECRET=随机长字符串(>=32)
    secret: ${TOOLBOX_AUTH_SECRET:kai-toolbox-local-default-secret-change-me-32B}
    # access / refresh 有效期，支持 30m / 7d / 12h 等写法
    access-ttl: 30m
    refresh-ttl: 7d
    # 需要「硬鉴权」(不达标 401) 的 Ant 路径。默认空 = 不硬拦任何请求。
    # 注意：视频库/磁盘管理用 @SoftGuard 软鉴权(无权返回空)，**不要**放进这里，否则会变 401。
    protected-patterns: []
    # 配置驱动的 ADMIN-only 软鉴权路径：命中且 handler 无 @SoftGuard 时，非 ADMIN 一律返回空。
    # 这批模块仅管理员可见数据。磁盘空间分析(/api/treesize)保持 @SoftGuard 注解(VIDEO_LIBRARY/DISK_ADMIN)，不在此。
    admin-only-patterns:
      - "/api/config/**"          # 配置中心
      - "/api/flatten/**"         # 目录扁平化
      - "/api/vscode-tunnel/**"   # VS Code Tunnel
      - "/api/browser-request/**" # 站点录制编排
      - "/api/ffmpeg-lab/**"      # FFmpeg 转码试验台
      - "/api/video-condense/**"  # 视频智能变速
      - "/api/hosts/**"           # 主机管理
      - "/api/docker/**"          # Docker 治理
      - "/api/webterm/**"         # Web 终端 REST（WS 终端由 AdminHandshakeInterceptor 握手鉴权）
      - "/api/ai-secretary/**"    # AI 秘书（私人笔记/账号等数据，仅管理员可见）
    # 始终放行的路径（即使命中 protected-patterns）。登录/刷新接口必须放行。
    whitelist:
      - "/api/auth/login"
      - "/api/auth/refresh"
    # 首启动若 auth_user 表为空且配置了用户名，则建一个 ADMIN 账户。
    # 密码留空时随机生成并打印到启动日志（仅打印一次）。
    bootstrap-admin-username: ${TOOLBOX_AUTH_ADMIN_USER:admin}
    bootstrap-admin-password: ${TOOLBOX_AUTH_ADMIN_PASSWORD:}

  mail:
    enabled: false          # 设为 true 启动内嵌 SMTP 服务器
    port: 1025              # Linux 25 端口需要 root；建议用 1025 + iptables 转发
    hostname: localhost     # SMTP EHLO 响应 hostname
    sender-whitelist:       # 发件人白名单，空列表接受所有来源
      # - "@amazon.com"
      # - "@ebay.com"
    recipient-domain-whitelist:   # 收件人域白名单，空 = 全收；公网暴露 25 端口建议必配
      - "chivepockets.com"
      - "exception-coder.com"
    max-connections: 20           # 最大并发 SMTP 连接
    max-recipients: 50            # 单封最大收件人数
    max-message-size-bytes: 10485760   # 单封最大字节（含附件 base64），10MB

logging:
  level:
    root: INFO
    com.exceptioncoder.toolbox: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
